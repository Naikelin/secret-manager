apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  interval: 1m
  path: "./namespaces"
  prune: true
  sourceRef:
    kind: GitRepository
    name: secrets-repo
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  timeout: 2m
  # Force recreation of secrets if they exist
  force: false
  # Wait for all resources to be ready
  wait: true
