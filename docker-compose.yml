# version: '3.9' # Obsolete in Docker Compose v2+

services:
  postgres:
    image: postgres:15-alpine
    container_name: secretmanager-postgres
    environment:
      POSTGRES_DB: secretmanager
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d secretmanager"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - secretmanager

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: secretmanager-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://dev:devpass@postgres:5432/secretmanager?sslmode=disable
      PORT: 8080
      LOG_LEVEL: debug
      AUTH_PROVIDER: mock
      JWT_SECRET: dev-secret-change-in-production
      GIT_REPO_PATH: /data/secrets-repo
      GIT_REPO_URL: ${GIT_REPO_URL:-}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_AUTH_TYPE: ${GIT_AUTH_TYPE:-ssh}
      GIT_USERNAME: ${GIT_USERNAME:-}
      GIT_TOKEN: ${GIT_TOKEN:-}
      GIT_SSH_KEY_PATH: /app/.ssh/id_rsa
      GIT_AUTHOR_NAME: Secret Manager Dev
      GIT_AUTHOR_EMAIL: dev@secret-manager.local
      # SOPS configuration - KMS
      SOPS_ENABLED: "true"
      SOPS_ENCRYPT_TYPE: kms
      SOPS_KMS_KEY_ARN: ${SOPS_KMS_KEY_ARN}
      # AWS Configuration for LocalStack
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://host.docker.internal:4566
      AWS_EC2_METADATA_DISABLED: "true"
      # Kubernetes configuration
      K8S_KUBECONFIG: /app/.kube/config
      DRIFT_CHECK_INTERVAL: 5m
      DRIFT_WEBHOOK_URL: ${DRIFT_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
      - ./dev-data/secrets-repo:/data/secrets-repo
      - ./dev-data/ssh-keys:/app/.ssh:ro
      - ~/.kube:/app/.kube:ro
      - backend_cache:/go/pkg/mod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - secretmanager

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: secretmanager-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - secretmanager

  # oauth-mock:
  #   image: ghusta/oauth2-mock-server:latest
  #   container_name: secretmanager-oauth-mock
  #   ports:
  #     - "9000:8080"
  #   environment:
  #     CLIENT_ID: dev-client
  #     CLIENT_SECRET: dev-secret
  #     REDIRECT_URI: http://localhost:3000/api/auth/callback
  #   networks:
  #     - secretmanager

volumes:
  postgres_data:
  backend_cache:

networks:
  secretmanager:
    driver: bridge
