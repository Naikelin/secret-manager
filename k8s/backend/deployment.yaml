apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: secret-manager
  labels:
    app: backend
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      serviceAccountName: secret-manager-backend
      containers:
      - name: backend
        image: secret-manager-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: LOG_LEVEL
        - name: AUTH_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: AUTH_PROVIDER
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_CLIENT_ID
              optional: true
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_CLIENT_SECRET
              optional: true
        - name: AZURE_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_TENANT_ID
              optional: true
        - name: GIT_REPO_PATH
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_REPO_PATH
        - name: GIT_REPO_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_REPO_URL
              optional: true
        - name: GIT_BRANCH
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_BRANCH
        - name: GIT_AUTH_TYPE
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_AUTH_TYPE
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: GIT_TOKEN
              optional: true
        - name: GIT_AUTHOR_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_AUTHOR_NAME
        - name: GIT_AUTHOR_EMAIL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: GIT_AUTHOR_EMAIL
        - name: SOPS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: SOPS_ENABLED
        - name: SOPS_ENCRYPT_TYPE
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: SOPS_ENCRYPT_TYPE
        - name: SOPS_AGE_KEY_PATH
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: SOPS_AGE_KEY_PATH
        - name: K8S_KUBECONFIG
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: K8S_KUBECONFIG
        - name: DRIFT_CHECK_INTERVAL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DRIFT_CHECK_INTERVAL
        - name: DRIFT_WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DRIFT_WEBHOOK_URL
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: git-data
          mountPath: /data/secrets-repo
        - name: sops-age-key
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: git-data
        emptyDir: {}
      - name: sops-age-key
        secret:
          secretName: backend-secrets
          items:
          - key: SOPS_AGE_KEY
            path: sops-age-key
          optional: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-manager-backend
  namespace: secret-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-manager-backend
rules:
- apiGroups: [""]
  resources: ["secrets", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-manager-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-manager-backend
subjects:
- kind: ServiceAccount
  name: secret-manager-backend
  namespace: secret-manager
