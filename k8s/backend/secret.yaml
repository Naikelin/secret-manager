apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: secret-manager
type: Opaque
stringData:
  JWT_SECRET: changeme-production-jwt-secret
  DATABASE_URL: postgres://admin:changeme-production-password@postgres:5432/secretmanager?sslmode=disable
  # Git configuration (optional - populate if using GitOps drift detection)
  GIT_TOKEN: ""
  # SOPS Age key (optional - populate if using SOPS encryption)
  SOPS_AGE_KEY: ""
  # Azure AD credentials (optional - populate if using Azure AD auth)
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_TENANT_ID: ""
