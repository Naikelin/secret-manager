apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.backend.jwtSecret | quote }}
  DATABASE_URL: {{ include "secret-manager.databaseUrl" . | quote }}
  {{- if .Values.backend.git.token }}
  GIT_TOKEN: {{ .Values.backend.git.token | quote }}
  {{- end }}
  {{- if .Values.backend.sops.ageKey }}
  SOPS_AGE_KEY: {{ .Values.backend.sops.ageKey | quote }}
  {{- end }}
  {{- if .Values.backend.azure.clientId }}
  AZURE_CLIENT_ID: {{ .Values.backend.azure.clientId | quote }}
  {{- end }}
  {{- if .Values.backend.azure.clientSecret }}
  AZURE_CLIENT_SECRET: {{ .Values.backend.azure.clientSecret | quote }}
  {{- end }}
  {{- if .Values.backend.azure.tenantId }}
  AZURE_TENANT_ID: {{ .Values.backend.azure.tenantId | quote }}
  {{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: secretmanager
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: changeme-production-password
{{- end }}
