apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
    app: backend
    component: api
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: backend
        component: api
    spec:
      serviceAccountName: {{ include "secret-manager.serviceAccountName" . }}
      containers:
      - name: backend
        image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
        imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.port }}
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: backend-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: JWT_SECRET
        {{- if .Values.backend.git.token }}
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: GIT_TOKEN
        {{- end }}
        {{- if .Values.backend.azure.clientId }}
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_CLIENT_ID
        {{- end }}
        {{- if .Values.backend.azure.clientSecret }}
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_CLIENT_SECRET
        {{- end }}
        {{- if .Values.backend.azure.tenantId }}
        - name: AZURE_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: AZURE_TENANT_ID
        {{- end }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources.backend | nindent 10 }}
        volumeMounts:
        - name: git-data
          mountPath: {{ .Values.backend.git.repoPath }}
        {{- if .Values.backend.sops.ageKey }}
        - name: sops-age-key
          mountPath: /secrets
          readOnly: true
        {{- end }}
      volumes:
      - name: git-data
        emptyDir: {}
      {{- if .Values.backend.sops.ageKey }}
      - name: sops-age-key
        secret:
          secretName: backend-secrets
          items:
          - key: SOPS_AGE_KEY
            path: sops-age-key
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "secret-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "secret-manager.fullname" . }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "secret-manager.fullname" . }}
  labels:
    {{- include "secret-manager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "secret-manager.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "secret-manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
