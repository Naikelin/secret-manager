# Docker Compose configuration for E2E testing
# All services run in containers for reproducible test environment

services:
  postgres:
    image: postgres:15-alpine
    container_name: secretmanager-e2e-postgres
    environment:
      POSTGRES_DB: secretmanager
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5433:5432"  # Different host port to avoid conflicts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d secretmanager"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - secretmanager-e2e

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: secretmanager-e2e-seed
    environment:
      DATABASE_URL: postgres://dev:devpass@postgres:5432/secretmanager?sslmode=disable
    volumes:
      - ./backend:/app
      - backend_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    command: ["go", "run", "scripts/seed-e2e.go"]
    networks:
      - secretmanager-e2e

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: secretmanager-e2e-backend
    ports:
      - "8081:8080"  # Different host port to avoid conflicts
    environment:
      DATABASE_URL: postgres://dev:devpass@postgres:5432/secretmanager?sslmode=disable
      PORT: 8080
      LOG_LEVEL: debug
      AUTH_PROVIDER: mock
      JWT_SECRET: dev-secret-change-in-production
      FRONTEND_URL: http://frontend:3000
      GIT_REPO_PATH: /data/secrets-repo
      SOPS_AGE_KEY_FILE: /keys/age.txt
      GIT_REPO_URL: ${GIT_REPO_URL:-}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_AUTH_TYPE: ${GIT_AUTH_TYPE:-ssh}
      GIT_SSH_KEY_PATH: /app/.ssh/id_rsa
      GIT_AUTHOR_NAME: Secret Manager Dev
      GIT_AUTHOR_EMAIL: dev@secret-manager.local
      SOPS_ENABLED: "true"
      SOPS_ENCRYPT_TYPE: age
      SOPS_AGE_KEY_PATH: /app/.age/keys.txt
      K8S_KUBECONFIG: /app/.kube/config
      DRIFT_CHECK_INTERVAL: 5m
      DRIFT_WEBHOOK_URL: ${DRIFT_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
      - ./dev-data/secrets-repo:/data/secrets-repo
      - ./dev-data/age-key.txt:/keys/age.txt:ro
      - ./dev-data/age-keys:/app/.age:ro
      - ./dev-data/ssh-keys:/app/.ssh:ro
      - backend_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - secretmanager-e2e

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: secretmanager-e2e-frontend
    ports:
      - "3001:3000"  # Different host port to avoid conflicts
    environment:
      # Frontend uses backend service name for internal API calls
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXTAUTH_URL: http://frontend:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - secretmanager-e2e

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: secretmanager-e2e-playwright
    working_dir: /app
    environment:
      # Playwright uses frontend service name for browser connections
      PLAYWRIGHT_BASE_URL: http://frontend:3000
      CI: "true"
      # Browser environment
      HOME: /tmp
    volumes:
      - ./frontend:/app  # Need write access for npm install
      - playwright_node_modules:/app/node_modules  # Use volume for node_modules
    depends_on:
      frontend:
        condition: service_healthy
    command: sh -c "npm install && npm run test:e2e"
    networks:
      - secretmanager-e2e

volumes:
  backend_cache:
  playwright_node_modules:

networks:
  secretmanager-e2e:
    driver: bridge
